 <!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Heap Visualizer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- ================= HEADER ================= -->

    <header>

        <h1>🌳 Heap Visualizer</h1>

        <p>
            Interactive Min Heap & Max Heap Visualization
        </p>

    </header>

    <!-- ================= CONTROL PANEL ================= -->

    <section class="control-panel">

        <div class="control-group">

            <label>Heap Type</label>

            <select id="heapType">

                <option value="max">
                    Max Heap
                </option>

                <option value="min">
                    Min Heap
                </option>

            </select>

        </div>

        <div class="control-group">

            <label>Insert Element</label>

            <input
                type="number"
                id="insertValue"
                placeholder="Enter Number">

            <button id="insertBtn">
                Insert
            </button>

        </div>

        <div class="control-group">

            <label>Delete Element</label>

            <input
                type="number"
                id="deleteValue"
                placeholder="Enter Number">

            <button id="deleteBtn">
                Delete Value
            </button>

        </div>

        <div class="button-group">

            <button id="deleteRootBtn">
                Delete Root
            </button>

            <button id="peekBtn">
                Peek
            </button>

            <button id="buildHeapBtn">
                Build Heap
            </button>

            <button id="heapSortBtn">
                Heap Sort
            </button>

            <button id="clearBtn">
                Clear
            </button>

        </div>

    </section>

    <!-- ================= MAIN CONTENT ================= -->

    <main class="main-layout">

        <!-- LEFT -->

        <section class="visualizer">

            <div class="panel-title">

                Heap Tree

            </div>

            <!-- SVG Canvas -->

            <svg
                id="heapCanvas"
                width="1200"
                height="650">

            </svg>

        </section>

        <!-- RIGHT -->

        <aside class="side-panel">

            <!-- Array -->

            <div class="card">

                <h3>Array Representation</h3>

                <div id="arrayContainer">

                </div>

            </div>

            <!-- Statistics -->

            <div class="card">

                <h3>Statistics</h3>

                <p>

                    Heap Size :
                    <span id="heapSize">

                        0

                    </span>

                </p>

                <p>

                    Heap Height :
                    <span id="heapHeight">

                        0

                    </span>

                </p>

                <p>

                    Root :
                    <span id="rootValue">

                        -

                    </span>

                </p>

            </div>

            <!-- Operation History -->

            <div class="card">

                <h3>

                    Operation History

                </h3>

                <ul id="history">

                </ul>

            </div>

        </aside>

    </main>

    <!-- ================= FOOTER ================= -->

<footer>

    <div id="status">
        Ready...
    </div>

    <div class="credits">
        <p>Made with ❤️ by <strong>VAISHNAVI M</strong> & <strong>SHIVANI STALIN</strong></p>
    </div>

</footer>
</div>

<script src="script.js"></script>

</body>

</html>
